<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JPUZ v2.1 — 接收端</title>
    <style>
        :root {
            --color-primary: #1a73e8;
            --color-primary-hover: #1557b0;
            --color-text: #333333;
            --color-text-secondary: #666666;
            --color-bg: #f5f5f5;
            --color-card-bg: #ffffff;
            --color-border: #e0e0e0;
            --color-success: #4caf50;
            --color-warning: #e94560;
            --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.1);
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            --font-mono: "SF Mono", "Cascadia Code", "Consolas", "Liberation Mono", monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); color: var(--color-text); background: var(--color-bg); padding: 16px; max-width: 600px; margin: 0 auto; line-height: 1.6; }
        h1 { text-align: center; font-size: 20px; font-weight: 600; margin-bottom: 16px; }
        .section { background: var(--color-card-bg); border-radius: 8px; box-shadow: var(--shadow-card); padding: 16px; margin-bottom: 16px; }
        .camera-wrap { position: relative; width: 100%; background: #000; border-radius: 8px; overflow: hidden; }
        .camera-wrap video { width: 100%; display: block; border-radius: 8px; }
        .scan-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 65%; aspect-ratio: 1; border: 2px dashed rgba(255,255,255,0.6); border-radius: 12px; pointer-events: none; transition: border-color 0.2s, box-shadow 0.2s; }
        .scan-overlay.flash { border-color: var(--color-success); box-shadow: 0 0 20px rgba(76,175,80,0.5); }
        .status-bar { text-align: center; margin-top: 12px; }
        .status-text { font-size: 14px; font-weight: 500; color: var(--color-text-secondary); }
        .progress-wrap { margin-top: 12px; }
        .progress-bar-outer { background: #e8e8e8; border-radius: 4px; overflow: hidden; height: 8px; }
        .progress-bar-inner { height: 100%; background: var(--color-primary); border-radius: 4px; width: 0%; transition: width 0.2s; }
        .progress-text { text-align: center; font-size: 13px; color: var(--color-text-secondary); margin-top: 6px; font-family: var(--font-mono); }
        .chunk-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
        .chunk-tag { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 28px; border-radius: 4px; font-size: 12px; font-weight: 600; font-family: var(--font-mono); border: 1px solid var(--color-border); background: #f9f9f9; color: var(--color-text-secondary); transition: all 0.2s; }
        .chunk-tag.collected { background: var(--color-success); color: #fff; border-color: var(--color-success); }
        .chunk-tag.parity { background: #ff9800; color: #fff; border-color: #ff9800; }
        .controls { display: flex; justify-content: center; gap: 12px; margin-top: 12px; }
        .btn { padding: 8px 24px; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
        .btn-primary { background: var(--color-primary); color: #fff; }
        .btn-primary:hover { background: var(--color-primary-hover); }
        .btn-secondary { background: #eee; color: var(--color-text); }
        .btn-secondary:hover { background: #ddd; }
        .result-section { display: none; }
        .result-section.active { display: block; }
        .result-stats { display: flex; gap: 24px; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 12px; }
        .result-stats .value { font-weight: 600; color: var(--color-text); font-family: var(--font-mono); }
        .result-text { width: 100%; min-height: 120px; max-height: 300px; padding: 12px; border: 1px solid var(--color-border); border-radius: 6px; font-family: var(--font-sans); font-size: 13px; line-height: 1.6; resize: vertical; outline: none; background: #fafafa; }
        .result-actions { margin-top: 12px; display: flex; gap: 12px; }
        .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #333; color: #fff; padding: 10px 24px; border-radius: 6px; font-size: 14px; z-index: 9999; transition: transform 0.3s; pointer-events: none; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        @media (max-width: 480px) { body { padding: 12px; } h1 { font-size: 18px; } }
    </style>
</head>
<body>
    <h1>&#x1F4F1; JPUZ v2.1 — 接收端</h1>
    <div class="section">
        <div class="camera-wrap">
            <video id="video" playsinline autoplay muted></video>
            <div class="scan-overlay" id="scanOverlay"></div>
        </div>
        <div class="status-bar">
            <div class="status-text" id="statusText">正在初始化...</div>
        </div>
        <div class="progress-wrap">
            <div class="progress-bar-outer"><div class="progress-bar-inner" id="progressFill"></div></div>
            <div class="progress-text" id="progressText">0</div>
        </div>
        <div class="chunk-grid" id="chunkGrid"></div>
    </div>
    <div class="section result-section" id="resultSection">
        <div class="result-stats">
            <span>字数：<span class="value" id="charResult">0</span></span>
            <span>字节：<span class="value" id="byteResult">0</span></span>
        </div>
        <textarea class="result-text" id="resultText" readonly></textarea>
        <div class="result-actions">
            <button class="btn btn-primary" id="btnCopy">复制全文</button>
            <button class="btn btn-secondary" id="btnReset">重新扫描</button>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script src="jsQR.js"></script>
    <script src="pako.min.js"></script>
    <script src="reed-solomon.js"></script>
    <script>
    (function() {
        'use strict';
        var sharedEncoder = new TextEncoder();

        // ---- Header Parser (v2 format) ----
        function parseHeader(payload) {
            var match = payload.match(/^v2\[(\d+)\/(\d+)\]t:(\d+)\|c:(\d+)\|z:(\d+)\|r:(\d+)\|f:(\d+)\n/);
            if (!match) return null;
            return {
                partNum: parseInt(match[1], 10),
                totalParts: parseInt(match[2], 10),
                totalChars: parseInt(match[3], 10),
                chunkBytes: parseInt(match[4], 10),
                compressed: parseInt(match[5], 10) === 1,
                parityCount: parseInt(match[6], 10),
                dataFrames: parseInt(match[7], 10),
                body: payload.substring(match[0].length)
            };
        }

        // ---- State ----
        var video = null;
        var scanCanvas = null;
        var scanCtx = null;
        var processCanvas = null;
        var processCtx = null;
        var PROCESS_WIDTH = 640;
        var collected = {};
        var collectedCount = 0;
        var totalParts = null;
        var expectedTotalChars = null;
        var isCompressed = false;
        var parityCount = 0;
        var dataFrames = null;
        var isScanning = false;

        // ---- UI Helpers ----
        function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(function() { t.classList.remove('show'); }, 2500);
        }

        function setStatus(text) {
            document.getElementById('statusText').textContent = text;
        }

        function updateProgress() {
            var pct = totalParts ? Math.round((collectedCount / totalParts) * 100) : 0;
            document.getElementById('progressFill').style.width = pct + '%';
            var progressInfo = collectedCount + (totalParts ? ' / ' + totalParts : '');
            if (dataFrames && parityCount > 0) {
                var have = 0;
                for (var i = 1; i <= dataFrames; i++) { if (collected[i]) have++; }
                progressInfo += '  (数据:' + have + '/' + dataFrames + ')';
            }
            document.getElementById('progressText').textContent = progressInfo;
            updateChunkGrid();
        }

        function updateChunkGrid() {
            var grid = document.getElementById('chunkGrid');
            grid.innerHTML = '';
            var count = totalParts || collectedCount;
            for (var i = 1; i <= count; i++) {
                var span = document.createElement('span');
                var cls = 'chunk-tag';
                if (collected[i]) cls += ' collected';
                else if (dataFrames && i > dataFrames) cls += ' parity';
                span.className = cls;
                span.textContent = i;
                grid.appendChild(span);
            }
        }

        function onNewFrameScanned(partNum) {
            var overlay = document.getElementById('scanOverlay');
            overlay.classList.add('flash');
            setTimeout(function() { overlay.classList.remove('flash'); }, 200);
            if (navigator.vibrate) navigator.vibrate(50);
        }

        // ---- Convert QR body string to Uint8Array ----
        function bodyToBytes(body) {
            var bytes = new Uint8Array(body.length);
            for (var i = 0; i < body.length; i++) {
                bytes[i] = body.charCodeAt(i) & 0xFF;
            }
            return bytes;
        }

        // ---- Scanner Init ----
        function initScanner() {
            scanCanvas = document.createElement('canvas');
            scanCtx = scanCanvas.getContext('2d', { willReadFrequently: true });
            processCanvas = document.createElement('canvas');
            processCtx = processCanvas.getContext('2d', { willReadFrequently: true });
            scanCanvas.width = video.videoWidth;
            scanCanvas.height = video.videoHeight;
            var scale = PROCESS_WIDTH / video.videoWidth;
            processCanvas.width = PROCESS_WIDTH;
            processCanvas.height = Math.round(video.videoHeight * scale);
        }

        // ---- Core: onFrameDecoded ----
        function onFrameDecoded(parsed) {
            if (parsed.partNum < 1) return;
            if (collected[parsed.partNum]) return;

            collected[parsed.partNum] = bodyToBytes(parsed.body);
            collectedCount++;

            if (!totalParts || parsed.totalParts > totalParts) totalParts = parsed.totalParts;
            if (parsed.totalChars > 0) expectedTotalChars = parsed.totalChars;
            if (parsed.compressed) isCompressed = true;
            if (parsed.parityCount > 0) parityCount = parsed.parityCount;
            if (parsed.dataFrames > 0) dataFrames = parsed.dataFrames;

            onNewFrameScanned(parsed.partNum);
            updateProgress();

            // Check if we can assemble
            if (totalParts && collectedCount >= totalParts) {
                assembleAndShow();
            } else if (dataFrames && parityCount > 0) {
                var haveData = 0;
                for (var i = 1; i <= dataFrames; i++) { if (collected[i]) haveData++; }
                if (haveData >= dataFrames) {
                    assembleAndShow();
                }
            }
        }

        // ---- Scan Loop ----
        function scanFrame() {
            if (!isScanning) return;
            if (video.readyState >= video.HAVE_ENOUGH_DATA) {
                scanCtx.drawImage(video, 0, 0);
                processCtx.drawImage(scanCanvas, 0, 0, processCanvas.width, processCanvas.height);
                var imageData = processCtx.getImageData(0, 0, processCanvas.width, processCanvas.height);
                var result = jsQR(imageData.data, imageData.width, processCanvas.height, {
                    inversionAttempts: 'attemptBoth'
                });
                if (result && result.data) {
                    var parsed = parseHeader(result.data);
                    if (parsed && parsed.partNum >= 1) {
                        onFrameDecoded(parsed);
                    }
                }
            }
            requestAnimationFrame(scanFrame);
        }

        // ---- Assembly with RS decode + pako ungzip ----
        function assembleAndShow() {
            var k = dataFrames || totalParts;
            var r = parityCount || 0;
            var n = totalParts || k;

            var allPresent = true;
            for (var i = 1; i <= n; i++) {
                if (!collected[i]) { allPresent = false; break; }
            }

            if (!allPresent && r > 0 && k > 0) {
                setStatus('RS纠错恢复中...');
                var shards = new Array(n);
                var avail = [];
                for (var i = 0; i < n; i++) {
                    if (collected[i + 1]) {
                        shards[i] = collected[i + 1];
                        avail.push(i);
                    }
                }
                if (avail.length < k) {
                    setStatus('已收到 ' + collectedCount + '/' + n + ' 帧，还需 ' + (k - avail.length) + ' 帧数据');
                    return;
                }
                try {
                    var recovered = RS.decode(shards, avail, k);
                    for (var i = 0; i < n; i++) {
                        if (recovered[i]) collected[i + 1] = recovered[i];
                    }
                    var ok = true;
                    for (var i = 1; i <= k; i++) {
                        if (!collected[i]) { ok = false; break; }
                    }
                    if (!ok) {
                        setStatus('RS纠错失败，继续扫描...');
                        return;
                    }
                } catch (e) {
                    setStatus('RS纠错出错: ' + e.message);
                    return;
                }
            } else if (!allPresent) {
                var missing = [];
                for (var i = 1; i <= n; i++) { if (!collected[i]) missing.push(i); }
                setStatus('缺失第 ' + missing.join(',') + ' 帧，继续扫描...');
                return;
            }

            // Stop camera
            isScanning = false;
            var stream = video.srcObject;
            if (stream) {
                stream.getTracks().forEach(function(t) { t.stop(); });
                video.srcObject = null;
            }

            // Concatenate data frames (first k frames)
            var chunks = [];
            var totalByteLen = 0;
            for (var i = 1; i <= k; i++) {
                chunks.push(collected[i]);
                totalByteLen += collected[i].length;
            }
            var combined = new Uint8Array(totalByteLen);
            var offset = 0;
            for (var i = 0; i < chunks.length; i++) {
                combined.set(chunks[i], offset);
                offset += chunks[i].length;
            }

            // Decompress
            var finalText;
            try {
                if (isCompressed) {
                    var decompressed = pako.ungzip(combined);
                    finalText = new TextDecoder('utf-8').decode(decompressed);
                } else {
                    finalText = new TextDecoder('utf-8').decode(combined);
                }
            } catch (e) {
                setStatus('⚠️ 解压/解码失败: ' + e.message);
                return;
            }

            // Show result
            var statusEl = document.getElementById('statusText');
            if (expectedTotalChars && finalText.length !== expectedTotalChars) {
                statusEl.textContent = '⚠️ 字数不匹配：预期 ' + expectedTotalChars + '，实际 ' + finalText.length;
                statusEl.style.color = 'var(--color-warning)';
            } else {
                var msg = '✅ 扫描完成！共 ' + collectedCount + ' 帧';
                if (r > 0) msg += ' (RS纠错:' + r + ')';
                statusEl.textContent = msg;
                statusEl.style.color = 'var(--color-success)';
            }

            document.getElementById('resultText').value = finalText;
            document.getElementById('charResult').textContent = finalText.length.toLocaleString();
            document.getElementById('byteResult').textContent = sharedEncoder.encode(finalText).length.toLocaleString();
            document.getElementById('resultSection').classList.add('active');

            if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 100]);
        }

        // ---- Copy ----
        function copyText() {
            var text = document.getElementById('resultText').value;
            if (!text) return;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function() { showToast('已复制到剪贴板'); });
            } else {
                var ta = document.getElementById('resultText');
                ta.select();
                document.execCommand('copy');
                showToast('已复制到剪贴板');
            }
        }

        // ---- Camera ----
        function startCamera() {
            video = document.getElementById('video');
            setStatus('正在请求摄像头权限...');
            navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
            }).then(function(stream) {
                video.srcObject = stream;
                video.setAttribute('playsinline', 'true');
                video.play().then(function() {
                    initScanner();
                    isScanning = true;
                    setStatus('扫描中... 请将摄像头对准电脑屏幕');
                    requestAnimationFrame(scanFrame);
                });
            }).catch(function(err) {
                if (err.name === 'NotAllowedError') {
                    setStatus('❌ 摄像头权限被拒绝，请允许后刷新');
                } else if (err.name === 'NotFoundError') {
                    setStatus('❌ 未找到摄像头');
                } else {
                    setStatus('❌ 摄像头错误：' + err.message);
                }
            });
        }

        // ---- Reset ----
        function resetScanner() {
            isScanning = false;
            if (video && video.srcObject) {
                video.srcObject.getTracks().forEach(function(t) { t.stop(); });
                video.srcObject = null;
            }
            collected = {};
            collectedCount = 0;
            totalParts = null;
            expectedTotalChars = null;
            isCompressed = false;
            parityCount = 0;
            dataFrames = null;
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressText').textContent = '0';
            document.getElementById('chunkGrid').innerHTML = '';
            document.getElementById('resultSection').classList.remove('active');
            document.getElementById('resultText').value = '';
            document.getElementById('statusText').style.color = '';
            startCamera();
        }

        // ---- Init ----
        document.addEventListener('DOMContentLoaded', function() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                setStatus('❌ 当前浏览器不支持摄像头');
                return;
            }
            document.getElementById('btnCopy').addEventListener('click', copyText);
            document.getElementById('btnReset').addEventListener('click', resetScanner);
            startCamera();
        });
    })();
    </script>
</body>
</html>
